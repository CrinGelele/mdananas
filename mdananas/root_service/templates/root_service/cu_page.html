{% extends 'base.html' %}
{% load static %}
{% block title %}speaker_card{% endblock %}

{% block content %}
    <form action="save/" method="POST"> 
        {% csrf_token %}
        <details open class="info-tab">
            <summary class="info-tab-label">
                <p>Product info</p>
                <button class="info-tab-label-form-save-btn" type="submit">Save</button>
            </summary>
            <div class="info-tab-label-form">
                    <div class="info-tab-label-form-field">
                        <label for="xcode_cu">xcode</label>
                        <input class="info-tab-label-form-field-input" type="text" name="xcode_cu" value="{{cu.xcode_cu|default_if_none:""}}">
                    </div>
                    <div class="info-tab-label-form-field">
                        <label for="ean_cu">ean_cu</label>
                        <input class="info-tab-label-form-field-input" type="text" name="ean_cu" value="{{cu.ean_cu|default_if_none:""}}">
                    </div>
                    <div class="info-tab-label-form-field">
                        <label for="category">category</label>
                        <input class="info-tab-label-form-field-input" type="text" name="category" value="{{cu.category|default_if_none:""}}">
                    </div>
                    <div class="info-tab-label-form-field">
                        <label for="groupname">groupname</label>
                        <input class="info-tab-label-form-field-input" type="text" name="groupname" value="{{cu.groupname|default_if_none:""}}">
                    </div>
                    <div class="info-tab-label-form-field">
                        <label for="status">status</label>
                        <input class="info-tab-label-form-field-input" type="text" name="status" value="{{cu.status|default_if_none:""}}">
                    </div>
                    <div class="info-tab-label-form-field">
                        <label for="type">type</label>
                        <input class="info-tab-label-form-field-input" type="text" name="type" value="{{cu.type|default_if_none:""}}">
                    </div>
                    <div class="info-tab-label-form-field">
                        <label for="shelf_life">shelf_life</label>
                        <input class="info-tab-label-form-field-input" type="text" name="shelf_life" value="{{cu.shelf_life|default_if_none:""}}">
                    </div>
                    <div class="info-tab-label-form-field">
                        <label for="supplier">supplier</label>
                        <input class="info-tab-label-form-field-input" type="text" name="supplier">
                    </div>
                    <div class="info-tab-label-form-field">
                        <label for="definition">definition</label>
                        <input class="info-tab-label-form-field-input" type="text" name="definition">
                    </div>
            </div>
        </details>
    </form>
    <form action="save-dimensions/" method="POST"> 
        {% csrf_token %}
        <details class="info-tab">
            <summary class="info-tab-label">
                <p>Product dimensions</p>
                <button class="info-tab-label-form-save-btn" type="submit">Save</button>
            </summary>
            <div class="info-tab-label-form">
                    <div class="info-tab-label-form-field">
                        <label for="length">length</label>
                        <input class="info-tab-label-form-field-input" type="text" name="length" value="{{dimensions.length|default_if_none:""}}">
                    </div>
                    <div class="info-tab-label-form-field">
                        <label for="width">width</label>
                        <input class="info-tab-label-form-field-input" type="text" name="width" value="{{dimensions.width|default_if_none:""}}">
                    </div>
                    <div class="info-tab-label-form-field">
                        <label for="height">height</label>
                        <input class="info-tab-label-form-field-input" type="text" name="height" value="{{dimensions.height|default_if_none:""}}">
                    </div>
                    <div class="info-tab-label-form-field">
                        <label for="diameter">diameter</label>
                        <input class="info-tab-label-form-field-input" type="text" name="diameter" value="{{dimensions.diameter|default_if_none:""}}">
                    </div>
                    <div class="info-tab-label-form-field">
                        <label for="volume">volume</label>
                        <input class="info-tab-label-form-field-input" type="text" name="volume" value="{{dimensions.volume|default_if_none:""}}">
                    </div>
                    <div class="info-tab-label-form-field">
                        <label for="net_weight">net_weight</label>
                        <input class="info-tab-label-form-field-input" type="text" name="net_weight" value="{{dimensions.net_weight|default_if_none:""}}">
                    </div>
            </div>
        </details>
    </form>
</body>
{% endblock %}
